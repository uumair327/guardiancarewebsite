<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- SEO Metadata -->
    <title>GuardianCare - Educating Children about Safety</title>
    <meta
      name="description"
      content="GuardianCare is a mobile app focused on educating children and parents about safety topics, child rights, and mental health. Join us to build a safer environment."
    />
    <meta
      name="keywords"
      content="child safety, POCSO act, child rights, mental health, educational app, parenting app, emergency contact, children of india"
    />
    <meta name="author" content="Children of India Foundation" />
    <link rel="canonical" href="https://childrenofindia.in" />

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="GuardianCare - Educating Children about Safety" />
    <meta
      property="og:description"
      content="GuardianCare is a mobile app focused on educating children and parents about safety topics, child rights, and mental health."
    />
    <meta property="og:url" content="https://childrenofindia.in" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:site_name" content="GuardianCare" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GuardianCare - Child Safety Made Accessible" />
    <meta
      name="twitter:description"
      content="Your comprehensive app for learning about child safety, rights, and mental health."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />
    <meta name="twitter:creator" content="@ChildrenOfIndia" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Robots Meta Tag -->
    <meta name="robots" content="index, follow, max-image-preview:large" />
    
    <!-- Additional SEO Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="application-name" content="GuardianCare" />
    <meta name="apple-mobile-web-app-title" content="GuardianCare" />
    
    <!-- Preconnect to important third-party domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Structured Data for SEO (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "GuardianCare",
        "operatingSystem": "Android, iOS",
        "applicationCategory": "EducationalApplication",
        "description": "GuardianCare is an educational mobile app designed to teach children and parents about critical safety topics, including child rights, mental health, and the POCSO act.",
        "image": "https://childrenofindia.in/logo512.png",
        "url": "https://childrenofindia.in",
        "offers": {
          "@type": "Offer",
          "price": "0.00",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Children of India Foundation",
          "logo": {
            "@type": "ImageObject",
            "url": "https://childrenofindia.in/logo192.png"
          }
        },
        "featureList": [
          "Interactive Learning Content",
          "Quizzes on Child Safety",
          "Community Forums",
          "Emergency Contact System",
          "Mental Health Resources"
        ]
      }
    </script>
  </body>
</html>
